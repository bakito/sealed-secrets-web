name: Build images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  id-token: write # required for keyless signing via GitHub OIDC

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        run: echo "curr_date=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Quay
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
        if: ${{ github.event.release.tag_name != '' || github.ref == 'refs/heads/main' }}

      - name: Build images ${{github.event.release.tag_name }}
        id: docker_build_release
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        if: ${{ github.event.release.tag_name != '' }}
        with:
          push: true
          pull: true
          tags: ghcr.io/bakito/sealed-secrets-web:latest,ghcr.io/bakito/sealed-secrets-web:${{ github.event.release.tag_name }},quay.io/bakito/sealed-secrets-web:latest,quay.io/bakito/sealed-secrets-web:${{ github.event.release.tag_name }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            BUILD=${{ env.curr_date }}

      - name: Sign release images
        if: ${{ github.event.release.tag_name != '' }}
        env:
          DIGEST: ${{ steps.docker_build_release.outputs.digest }}
        run: |
          for IMAGE in \
            ghcr.io/bakito/sealed-secrets-web \
            quay.io/bakito/sealed-secrets-web; do
            cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
          done

      - name: Build images
        id: docker_build_main
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        if: ${{ github.event.release.tag_name == '' }}
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          pull: true
          tags: ghcr.io/bakito/sealed-secrets-web:main,quay.io/bakito/sealed-secrets-web:main
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            VERSION=main
            BUILD=${{ env.curr_date }}

      - name: Sign main images
        if: ${{ github.event.release.tag_name == '' && github.ref == 'refs/heads/main' }}
        env:
          DIGEST: ${{ steps.docker_build_main.outputs.digest }}
        run: |
          for IMAGE in \
            ghcr.io/bakito/sealed-secrets-web \
            quay.io/bakito/sealed-secrets-web; do
            cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
          done

      - name: Image digest
        run: echo ${{ steps.docker_build_release.outputs.digest }}${{ steps.docker_build_main.outputs.digest }}
