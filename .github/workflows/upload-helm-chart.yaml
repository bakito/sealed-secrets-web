name: Upload Helm Chart

on:
  release:
    types:
      - published

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Login to ghcr.io
<<<<<<< Updated upstream
        uses: docker/login-action@v4
=======
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
>>>>>>> Stashed changes
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build chart
        run: |
          VERSION=$(echo "${{github.event.release.tag_name }}" | sed 's/v//g')
          sed -i "s/^version:.*$/version: ${VERSION}/"        ./chart/Chart.yaml
          sed -i "s/^appVersion:.*$/appVersion: v${VERSION}/" ./chart/Chart.yaml
          make helm-docs
          helm package ./chart/ --version $VERSION --app-version v$VERSION -d dist
          helm push dist/sealed-secrets-web-${VERSION}.tgz oci://ghcr.io/bakito/helm-charts

      - name: Install chart-releaser
        uses: engineerd/configurator@dc6b312d89ab097f73f3ebbf507a69dd7399c5d0 # v0.0.10
        with:
          name: cr
          url: https://github.com/helm/chart-releaser/releases/download/v1.6.1/chart-releaser_1.6.1_linux_amd64.tar.gz
          pathInArchive: cr

      - name: Upload Chart
        run: cr upload
        env:
          CR_OWNER: "${{github.repository_owner}}"
          CR_TOKEN: "${{secrets.CR_TOKEN}}"
          CR_GIT_REPO: "helm-charts"
          CR_PACKAGE_PATH: dist
